services:
  mongodb:
    image: mongo:7
    container_name: tp_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: tp_jwt_mongodb
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
      - mongo_data:/data/db

  app:
    build: ./app
    container_name: tp_node_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/tp_jwt_mongodb
      JWT_SECRET: secret
      JWT_EXPIRES_IN: 365d
    depends_on:
      - mongodb

volumes:
  mongo_data:
