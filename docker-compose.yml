services:
  mongodb:
    image: mongo:7
    container_name: tp_mongodb_green
    restart: unless-stopped
    ports:
      - "27018:27018"
    environment:
      MONGO_INITDB_DATABASE: tp_jwt_mongodb
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
      - mongo_data:/data/db

  app:
    build: ./app
    container_name: tp_node_app_green
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      MONGO_URI: mongodb://mongodb:27017/tp_jwt_mongodb
      JWT_SECRET: tutrouverapas
      JWT_EXPIRES_IN: 10m
    depends_on:
      - mongodb

volumes:
  mongo_data:
